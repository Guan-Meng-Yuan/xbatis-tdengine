name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['8', '11', '17', '21']
        xbatis: ['1.10.6', '1.10.7']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Verify unit tests and artifacts
        run: mvn --batch-mode --no-transfer-progress -Dxbatis.version=${{ matrix.xbatis }} clean verify
      - name: Reject bundled Xbatis core classes
        run: |
          if jar tf target/xbatis-tdengine-1.0.1.jar | grep -q '^cn/xbatis/ddl/auto/DefaultDDLBuilder'; then
            echo 'The extension jar must not override Xbatis core classes.'
            exit 1
          fi
